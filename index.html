<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高濃度芳香液（40ml）</title>

<style>

body{
font-family:Arial;
margin:0;
background:#020617;
color:white;
}

/* 背景粒子 */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:radial-gradient(circle,#ffffff22 1px,transparent 1px);
background-size:40px 40px;
opacity:0.15;
z-index:-1;
}

/* Banner */

.hero{
text-align:center;
padding:40px 20px;
background:linear-gradient(135deg,#020617,#111827);
}

.hero h1{
margin:0;
font-size:30px;
}

.hero p{
color:#9ca3af;
margin-top:8px;
}

/* 商品區 */

.container{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:16px;
}

/* 商品卡片 */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
padding:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.08);
transition:0.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 18px rgba(255,140,0,0.4);
}

/* 商品圖片 */

.card img{
width:100%;
height:140px;
object-fit:contain;
background:#020617;
border-radius:8px;
padding:6px;
}

/* 名稱 */

.name{
font-size:14px;
margin-top:6px;
min-height:32px;
}

/* 星星 */

.star{
color:#facc15;
font-size:13px;
}

/* 標籤 */

.badge{
display:inline-block;
padding:2px 8px;
border-radius:20px;
font-size:11px;
font-weight:bold;
margin-top:4px;
}

.t{
background:#fb923c;
color:white;
}

.u{
background:#3b82f6;
color:white;
}

.b{
background:#a855f7;
color:white;
}

/* 價格 */

.price{
color:#fb923c;
font-weight:bold;
font-size:16px;
margin-top:4px;
}

/* Popup */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
background:#111827;
padding:25px;
border-radius:12px;
max-width:400px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.close{
position:absolute;
font-size:26px;
cursor:pointer;
right:20px;
top:15px;
}

</style>
</head>

<body>

<div class="hero">
<h1>高濃度芳香液（40ml）</h1>
<p>Premium Aroma Collection</p>
</div>

<div class="container">

<div class="grid">

<div class="card" onclick="openStory('裝甲戰役')">
<img src="products/裝甲戰役.PNG">
<div class="name">裝甲戰役</div>
<div class="star">⭐⭐⭐</div>
<div class="badge u">U</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('Blue Boy')">
<img src="products/blue_boy.PNG">
<div class="name">Blue Boy</div>
<div class="star">⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('格蘭98')">
<img src="products/格蘭98.PNG">
<div class="name">格蘭98</div>
<div class="star">⭐⭐⭐⭐</div>
<div class="badge u">U</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('性感男人')">
<img src="products/性感男人.PNG">
<div class="name">性感男人</div>
<div class="star">⭐⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('壯漢')">
<img src="products/壯漢.PNG">
<div class="name">壯漢</div>
<div class="star">⭐⭐⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('曼陀羅')">
<img src="products/曼陀羅_1.PNG">
<div class="name">曼陀羅</div>
<div class="star">⭐⭐⭐</div>
<div class="badge b">B</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('綠巨人')">
<img src="products/綠巨人.PNG">
<div class="name">綠巨人</div>
<div class="star">⭐⭐⭐⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('金剛Baboon')">
<img src="products/金剛baboon.PNG">
<div class="name">金剛Baboon</div>
<div class="star">⭐⭐⭐⭐</div>
<div class="badge u">U</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('ELOKI')">
<img src="products/ELOKI.PNG">
<div class="name">ELOKI</div>
<div class="star">⭐⭐⭐⭐</div>
<div class="badge u">U</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('TNT炸藥')">
<img src="products/TNT炸藥.PNG">
<div class="name">TNT炸藥</div>
<div class="star">⭐⭐⭐⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

<div class="card" onclick="openStory('眼鏡蛇王')">
<img src="products/眼鏡蛇王.PNG">
<div class="name">眼鏡蛇王</div>
<div class="star">⭐⭐⭐⭐⭐</div>
<div class="badge t">T</div>
<div class="price">NT$850</div>
</div>

</div>
</div>

<!-- 故事卡 -->

<div id="storyModal" class="modal">
<div class="modal-box">
<span class="close" onclick="closeStory()">×</span>
<h2 id="storyTitle"></h2>
<p id="storyText"></p>
</div>
</div>

<script>

const stories = {

"裝甲戰役":"靈感來自重裝戰車。厚實、穩定、耐久的力量風格。",

"Blue Boy":"經典系列風格。平衡順暢、節奏自然。",

"格蘭98":"年份酒概念設計。成熟、穩定、濃度扎實。",

"性感男人":"力量與自信象徵。濃郁直接的氣息。",

"壯漢":"厚重型氣息。力量感強烈。",

"曼陀羅":"神秘系列。深沉、感官放大的風格。",

"綠巨人":"力量爆發系列。衝擊最強。",

"金剛Baboon":"野性力量風格。原始強烈。",

"ELOKI":"科技感系列。平衡與層次。",

"TNT炸藥":"爆發型氣息。速度與衝擊。",

"眼鏡蛇王":"敏捷速度型代表。爆發迅速。"

};

function openStory(name){
document.getElementById("storyTitle").innerText=name;
document.getElementById("storyText").innerText=stories[name];
document.getElementById("storyModal").style.display="flex";
}

function closeStory(){
document.getElementById("storyModal").style.display="none";
}

</script>

</body>
</html>
