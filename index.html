<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高濃度芳香液 (40ml)</title>
    <style>
        /* 顏色與基本設定 */
        :root {
            --bg-color: #0b0f19; /* 背景深藍色 */
            --card-bg: #151b2b;  /* 卡片底色 */
            --text-main: #ffffff; /* 主要文字白色 */
            --text-sub: #8b9bb4;  /* 次要文字灰藍色 */
            --accent-orange: #f39c12; /* 價格橘色 */
            --badge-blue: #3498db; /* U標籤藍色 */
            --badge-orange: #e67e22; /* T標籤橘色 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* 頂部連結按鈕樣式 */
        .top-link-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .top-link-btn {
            background-color: transparent;
            color: var(--accent-orange);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            border: 1px solid var(--accent-orange);
            transition: all 0.3s;
        }
        .top-link-btn:active {
            background-color: var(--accent-orange);
            color: #fff;
        }

        /* 標題與新手提示區塊 */
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .notice {
            color: #fff;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 20px;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 15px;
        }
        .notice-icon { color: #f1c40f; }

        /* 商品列表排版 (手機版雙排) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* 單個商品卡片設計 */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 圖片區塊 (白底) */
        .img-container {
            background-color: #fff;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .img-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        /* 文字與標籤細節 */
        .product-title {
            font-size: 1.1rem;
            margin: 5px 0;
            font-weight: bold;
        }
        .stars {
            color: #f1c40f;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .badge.u { background-color: var(--badge-blue); }
        .badge.t { background-color: var(--badge-orange); }
        .price {
            color: var(--accent-orange);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .desc {
            color: var(--text-sub);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="top-link-container">
        <a href="10ml.html" class="top-link-btn">👉 前往 一般濃度 (10ml) 專區</a>
    </div>

    <h1>高濃度芳香液（40ml）</h1>
    <div class="notice">
        <span class="notice-icon">⚠️</span> Beginner Notice / 新手提醒<br>
        本系列為高濃度配方，新手建議先從較低濃度的款式開始體驗。
    </div>

    <div class="product-grid">
        
        <div class="product-card">
            <div class="img-container">
                <img src="裝甲戰役.jpg" alt="裝甲戰役" onerror="this.style.display='none'">
            </div>
            <div class="product-title">裝甲戰役</div>
            <div class="stars">⭐️⭐️⭐️</div>
            <div class="badge u">U</div>
            <div class="price">NT$850</div>
            <div class="desc">鋼鐵裝甲般的穩定力量。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="blueboy.jpg" alt="Blue Boy" onerror="this.style.display='none'">
            </div>
            <div class="product-title">Blue Boy</div>
            <div class="stars">⭐️⭐️</div>
            <div class="badge t">T</div>
            <div class="price">NT$850</div>
            <div class="desc">經典節奏設計。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="格蘭98.jpg" alt="格蘭 98" onerror="this.style.display='none'">
            </div>
            <div class="product-title">格蘭 98</div>
            <div class="stars">⭐️⭐️⭐️</div>
            <div class="badge u">U</div>
            <div class="price">NT$850</div>
            <div class="desc">高純度經典款。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="性感男人.jpg" alt="性感男人" onerror="this.style.display='none'">
            </div>
            <div class="product-title">性感男人</div>
            <div class="stars">⭐️⭐️</div>
            <div class="badge t">T</div>
            <div class="price">NT$850</div>
            <div class="desc">專屬男性魅力。</div>
        </div>

    </div>

</body>
</html>
