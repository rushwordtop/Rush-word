background:#f4f4f4;
padding:20px;

h2{

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));

.card{

padding:12px;

}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.name{
font-weight:bold;
margin-top:6px;
}

.level{
color:#ff9900;
font-size:14px;
}

.type{
font-size:12px;
color:#666;
}

</style>
