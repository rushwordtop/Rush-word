<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高濃度芳香液 (40ml)</title>
    <style>
        :root {
            --bg-color: #080c16; 
            --card-bg: #111827;  
            --text-main: #ffffff; 
            --text-sub: #9ca3af;  
            --accent-orange: #f97316; 
            --badge-blue: #3b82f6; 
            --badge-orange: #f59e0b; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* 頂部連結按鈕 */
        .top-link-container {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        .top-link-btn {
            background-color: var(--card-bg);
            color: var(--accent-orange);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            border: 2px solid var(--accent-orange);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; font-weight: bold; }
        .notice { color: #d1d5db; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
        .notice-icon { color: #facc15; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-container {
            background-color: #ffffff;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .img-container img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .product-title { font-size: 1.05rem; margin: 4px 0; font-weight: bold; }
        .stars { color: #facc15; font-size: 0.9rem; margin-bottom: 6px; }
        .badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .badge.u { background-color: var(--badge-blue); }
        .badge.t { background-color: var(--badge-orange); }
        .price { color: var(--accent-orange); font-size: 1.15rem; font-weight: 800; margin-bottom: 6px; }
        .desc { color: var(--text-sub); font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="top-link-container">
        <a href="10ml.html" class="top-link-btn">👉 前往 一般濃度 (10ml) 專區</a>
    </div>

    <h1>高濃度芳香液 (40ml)</h1>
    <div class="notice">
        <span class="notice-icon">⚠️</span> Beginner Notice / 新手提醒<br>
        本系列為高濃度配方，新手建議先從較低濃度的款式開始體驗。
    </div>

    <div class="product-grid">
        
        <div class="product-card">
            <div class="img-container">
                <img src="products/blue_boy.PNG" alt="Blue Boy">
            </div>
            <div class="product-title">Blue Boy</div>
            <div class="stars">⭐️⭐️</div>
            <div class="badge t">T</div>
            <div class="price">NT$850</div>
            <div class="desc">經典節奏設計。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="products/性感男人.PNG" alt="性感男人">
            </div>
            <div class="product-title">性感男人</div>
            <div class="stars">⭐️⭐️</div>
            <div class="badge t">T</div>
            <div class="price">NT$850</div>
            <div class="desc">專屬男性魅力。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="products/格蘭98.PNG" alt="格蘭 98">
            </div>
            <div class="product-title">格蘭 98</div>
            <div class="stars">⭐️⭐️⭐️</div>
            <div class="badge u">U</div>
            <div class="price">NT$850</div>
            <div class="desc">高純度經典款。</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="products/大狗.PNG" alt="大狗">
            </div>
            <div class="product-title">大狗</div>
            <div class="stars">⭐️⭐️⭐️</div>
            <div class="badge u">U</div>
            <div class="price">NT$850</div>
            <div class="desc">強力推薦款式。</div>
        </div>

    </div>

</body>
</html>
